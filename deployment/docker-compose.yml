version: "3.9"

x-spark-common: &spark-common
  image: ade-fcm/spark:latest
  networks:
    - ade-fcm-net
  volumes:
    - data-volume:/data
    - notebooks-volume:/notebooks
  env_file:
    - .env.spark

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    hostname: zookeeper
    container_name: ade-fcm-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ade-fcm-net
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "-w", "2", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    hostname: kafka
    container_name: ade-fcm-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - ade-fcm-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-master:
    <<: *spark-common
    hostname: spark-master
    container_name: ade-fcm-spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "7077:7077"
      - "8080:8080"
      - "4040:4040"
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-worker-1:
    <<: *spark-common
    hostname: spark-worker-1
    container_name: ade-fcm-spark-worker-1
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_started
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: 4
      SPARK_WORKER_MEMORY: 8g
      SPARK_WORKER_PORT: 8881
    ports:
      - "8081:8081"

  spark-worker-2:
    <<: *spark-common
    hostname: spark-worker-2
    container_name: ade-fcm-spark-worker-2
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_started
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: 4
      SPARK_WORKER_MEMORY: 8g
      SPARK_WORKER_PORT: 8882
    ports:
      - "8082:8081"

  spark-worker-3:
    <<: *spark-common
    hostname: spark-worker-3
    container_name: ade-fcm-spark-worker-3
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_started
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: 4
      SPARK_WORKER_MEMORY: 8g
      SPARK_WORKER_PORT: 8883
    ports:
      - "8083:8081"

  jupyter:
    <<: *spark-common
    hostname: jupyter
    container_name: ade-fcm-jupyter
    build:
      context: .
      target: jupyter
    command:
      - jupyter
      - lab
      - "--ip=0.0.0.0"
      - "--port=8888"
      - "--no-browser"
      - "--allow-root"
      - "--NotebookApp.token=${JUPYTER_TOKEN:-changeme}"
      - "--NotebookApp.password=${JUPYTER_PASSWORD:-}"
    ports:
      - "8888:8888"
    depends_on:
      - spark-master

  mlflow:
    image: ade-fcm/spark:latest
    hostname: mlflow
    container_name: ade-fcm-mlflow
    build:
      context: .
      target: ade-fcm
    entrypoint: ["mlflow", "server"]
    command:
      - "--host=0.0.0.0"
      - "--port=5000"
      - "--backend-store-uri=sqlite:////data/mlflow.db"
      - "--default-artifact-root=/data/mlflow-artifacts"
    ports:
      - "5000:5000"
    networks:
      - ade-fcm-net
    volumes:
      - data-volume:/data

networks:
  ade-fcm-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  data-volume:
    driver: local
  notebooks-volume:
    driver: local
